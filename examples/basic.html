<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Riot Gallery Viewer - Basic Example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./style.css">

    <!-- include css file -->
    <link rel="stylesheet" href="./../riot-gallery-viewer.css?x=64458">

  </head>
  <body id="home">
    <div class="mainContainer">
      <h1>Riot Gallery Viewer - Basic Example</h1>

      <!-- 
      create a ul tag (unordered list) with a class of "riot-gallery'"
      optionally add class riot-gallery-style to style the gallery if you don't want to use your own styles
      -->
      <ul class="riot-gallery riot-gallery-style">
        <!-- each slide is an li tag (list item) -->
        <li><a href="./images/blue-jay.jpg" target="_blank"><img src="./images/blue-jay_thumb.jpg"></a><span>Blue Jay</span></li>
        <li><figure><a href="./images/squirrel.jpg" target="_blank"><img src="./images/squirrel_thumb.jpg"></a><figcaption>Squirrel</figcaption><figcaption></figcaption></figure></li>
        <li><a href="./images/port-au-prince-haiti.jpg" target="_blank"><img src="./images/port-au-prince-haiti_thumb.jpg"></a></li>
        <li><a href="./images/pennsylvania-landscape.jpg" target="_blank"><img src="./images/pennsylvania-landscape_thumb.jpg"></a></li>
        <li><a href="http://127.0.0.1:8080/gorilla/images/you-re-in-trouble/you-re-in-trouble-girls.jpg" target="_blank"><img src="http://127.0.0.1:8080/gorilla/images/you-re-in-trouble/you-re-in-trouble-girls.jpg"></a></li>
        <li><a href="https://mastergorilla.com/images/alan-hollywood/screen-shots/alan-ep06-lyndsey-matt-mitch-maria.jpg" target="_blank"><img src="./images/pennsylvania-landscape_thumb.jpg"></a></li>
        <li><a href="https://mastergorilla.com/images/you-re-in-trouble/you-re-in-trouble-movie-poster.jpg" target="_blank"><img src="./images/pennsylvania-landscape_thumb.jpg"></a></li>
      </ul>

      <!-- include javascript file -->
      <script src="./../riot-gallery-viewer.js"></script>
      
    </div>
  </body>
</html>
